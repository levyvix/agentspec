<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a87c"/>
      <stop offset="100%" style="stop-color:#d4845f"/>
    </linearGradient>
    <linearGradient id="titleFade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0b88c"/>
      <stop offset="100%" style="stop-color:#d4845f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="480" fill="url(#grid)" rx="12" opacity="0.3"/>

  <!-- ==================== LEFT SECTION ==================== -->

  <!-- Title: AGENT -->
  <text x="40" y="140" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="130" fill="url(#titleFade)" font-weight="900" letter-spacing="-2">AGENT</text>

  <!-- Title: SPEC -->
  <text x="40" y="270" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="130" fill="url(#titleFade)" font-weight="900" letter-spacing="-2">SPEC</text>

  <!-- Accent line -->
  <rect x="40" y="292" width="460" height="3" fill="url(#accentGrad)" rx="1.5"/>

  <!-- Subtitle -->
  <text x="40" y="340" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#e8a87c" font-weight="600" letter-spacing="0.5">Spec-Driven Data Engineering</text>

  <!-- Stats pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14">
    <rect x="40" y="360" width="100" height="28" fill="#1a1f29" stroke="#30363d" stroke-width="1" rx="14"/>
    <text x="90" y="379" text-anchor="middle" fill="#8b949e"><tspan fill="#e8a87c" font-weight="bold">41</tspan> agents</text>

    <rect x="152" y="360" width="128" height="28" fill="#1a1f29" stroke="#30363d" stroke-width="1" rx="14"/>
    <text x="216" y="379" text-anchor="middle" fill="#8b949e"><tspan fill="#e8a87c" font-weight="bold">22</tspan> commands</text>

    <rect x="292" y="360" width="140" height="28" fill="#1a1f29" stroke="#30363d" stroke-width="1" rx="14"/>
    <text x="362" y="379" text-anchor="middle" fill="#8b949e"><tspan fill="#e8a87c" font-weight="bold">22</tspan> KB domains</text>
  </g>

  <!-- 5-phase workflow -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <text x="40" y="424" font-size="11" fill="#484f58" font-weight="bold" letter-spacing="2">5-PHASE SDD WORKFLOW</text>

    <rect x="40" y="436" width="84" height="28" fill="#1a1f29" stroke="#e8a87c" stroke-width="1.2" rx="5"/>
    <text x="82" y="454" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">BRAINSTORM</text>

    <text x="130" y="454" font-size="13" fill="#484f58">&#x2192;</text>

    <rect x="142" y="436" width="64" height="28" fill="#1a1f29" stroke="#e8a87c" stroke-width="1.2" rx="5"/>
    <text x="174" y="454" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">DEFINE</text>

    <text x="212" y="454" font-size="13" fill="#484f58">&#x2192;</text>

    <rect x="224" y="436" width="64" height="28" fill="#1a1f29" stroke="#e8a87c" stroke-width="1.2" rx="5"/>
    <text x="256" y="454" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">DESIGN</text>

    <text x="294" y="454" font-size="13" fill="#484f58">&#x2192;</text>

    <rect x="306" y="436" width="56" height="28" fill="#1a1f29" stroke="#e8a87c" stroke-width="1.2" rx="5"/>
    <text x="334" y="454" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">BUILD</text>

    <text x="368" y="454" font-size="13" fill="#484f58">&#x2192;</text>

    <rect x="380" y="436" width="50" height="28" fill="#1a1f29" stroke="#e8a87c" stroke-width="1.2" rx="5"/>
    <text x="405" y="454" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">SHIP</text>
  </g>

  <!-- ==================== RIGHT: SLASH COMMANDS ==================== -->

  <!-- Dashed separator -->
  <line x1="580" y1="25" x2="580" y2="460" stroke="#21262d" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- SDD Workflow -->
  <text x="615" y="60" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#484f58" font-weight="bold" letter-spacing="2">SDD WORKFLOW</text>

  <g font-family="'SFMono-Regular', 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="24">
    <text x="1165" y="100" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/brainstorm</tspan> &lt;idea&gt;</text>
    <text x="1165" y="134" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/define</tspan> &lt;feature&gt;</text>
    <text x="1165" y="168" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/design</tspan> &lt;feature&gt;</text>
    <text x="1165" y="202" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/build</tspan> &lt;feature&gt;</text>
    <text x="1165" y="236" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/ship</tspan> &lt;feature&gt;</text>
  </g>

  <!-- Data Engineering -->
  <text x="615" y="280" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12" fill="#484f58" font-weight="bold" letter-spacing="2">DATA ENGINEERING</text>

  <g font-family="'SFMono-Regular', 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="24">
    <text x="1165" y="316" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/schema</tspan> &lt;model&gt;</text>
    <text x="1165" y="350" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/pipeline</tspan> &lt;etl&gt;</text>
    <text x="1165" y="384" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/data-quality</tspan> &lt;sql&gt;</text>
    <text x="1165" y="418" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/data-contract</tspan> &lt;sla&gt;</text>
    <text x="1165" y="452" text-anchor="end" fill="#6e7681"><tspan fill="#e8a87c">/lakehouse</tspan> &lt;fmt&gt;</text>
  </g>
</svg>